services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      PORT: "8080"
      UPLOAD_DIR: /data/uploads
    volumes:
      - ./data:/data

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./admin-frontend/dist:/srv/admin:ro
      - ./player-frontend/dist:/srv/player:ro
      - ./data:/data
      - caddy_data:/data/caddy
    depends_on:
      - backend

volumes:
  caddy_data:
