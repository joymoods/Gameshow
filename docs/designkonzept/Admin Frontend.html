<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BrainStorm — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0b0d14;color:#e4e8f5;font-family:'Outfit',system-ui,sans-serif;font-size:15px;min-height:100vh;overflow:hidden}
button{cursor:pointer;border:none;font-family:inherit;transition:all 0.15s}
button:disabled{opacity:0.38;cursor:not-allowed}
input,textarea,select{font-family:inherit;font-size:14px;background:#0b0d14;color:#e4e8f5;border:1px solid #252c40;border-radius:6px;padding:8px 12px;outline:none;transition:border-color 0.15s}
input:focus,textarea:focus,select:focus{border-color:#4f6ef7}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#252c40;border-radius:3px}

@keyframes floatUp{
  0%{opacity:1;transform:translateY(0) scale(1)}
  60%{opacity:1;transform:translateY(-28px) scale(1.15)}
  100%{opacity:0;transform:translateY(-48px) scale(0.9)}
}
@keyframes slideIn{
  from{transform:translateX(110%);opacity:0}
  to{transform:translateX(0);opacity:1}
}
@keyframes pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(240,180,41,0.5)}
  50%{box-shadow:0 0 0 10px rgba(240,180,41,0)}
}
@keyframes buzz{
  0%,100%{transform:scale(1)}
  30%{transform:scale(1.04)}
  60%{transform:scale(0.97)}
}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

    {id:'q33',points:300,text:'Was ist ein Media Query?',answer:'Eine CSS-Technik zum Anwenden von Styles basierend auf Geräteeigenschaften (z.B. Breite).',played:false},
    {id:'q34',points:400,text:'Was ist CSS Specificity?',answer:'Die Gewichtung eines Selektors. Bestimmt welche Regel bei Konflikten gilt.',played:false},
    {id:'q35',points:500,text:'Was sind CSS-Animationen?',answer:'Übergänge zwischen CSS-Zuständen via @keyframes und der animation-Eigenschaft.',played:false},
  ]},
  {id:'c4',name:'NODE.JS',questions:[
    {id:'q41',points:100,text:'Was ist Node.js?',answer:'Eine JavaScript-Laufzeitumgebung auf Basis der V8-Engine, die JS serverseitig ausführt.',played:false},
    {id:'q42',points:200,text:'Was ist npm?',answer:'Node Package Manager — Paketverwaltung für Node.js-Projekte.',played:false},

    {id:'q44',points:400,text:'Was ist Express.js?',answer:'Ein minimales, flexibles Node.js-Web-Framework für REST-APIs und Web-Apps.',played:false},
    {id:'q45',points:500,text:'Was ist async/await?',answer:'Syntaktischer Zucker für Promises. async macht eine Funktion asynchron, await wartet auf ein Promise.',played:false},

    {id:'q53',points:300,text:'Was ist git rebase?',answer:'Verschiebt Commits eines Branches auf eine neue Basis — erzeugt eine lineare Historie.',played:false},

const INIT_PLAYERS=[
  {id:'p1',name:'Anna',score:0},{id:'p2',name:'Ben',score:0},
  {id:'p3',name:'Clara',score:0},{id:'p4',name:'David',score:0},
];

/* ── TOAST SYSTEM ── */
function useToasts(){
  const [toasts,setToasts]=useState([]);
  const add=useCallback((msg,type='info')=>{
    const id=Date.now();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3200);
  },[]);
  return{toasts,add};
}
function Toasts({toasts}){
  const colors={success:T.gn,error:T.rd,info:T.pr,warning:T.go};
  return(
    <div style={{position:'fixed',top:16,right:16,display:'flex',flexDirection:'column',gap:8,zIndex:9999,pointerEvents:'none'}}>
      {toasts.map(t=>(
        <div key={t.id} style={{background:T.s2,border:`1px solid ${colors[t.type]||T.bd}`,borderLeft:`3px solid ${colors[t.type]||T.pr}`,borderRadius:8,padding:'10px 16px',fontSize:14,color:T.tx,minWidth:220,maxWidth:320,animation:'slideIn 0.25s ease',boxShadow:'0 8px 24px rgba(0,0,0,0.4)'}}>
          {t.msg}
        </div>
      ))}
    </div>
  );
}

/* ── SHARED: NAV ── */
function Nav({subtitle,roomCode,onEndGame,progress}){
  const pct=progress!=null?Math.round(progress*100):null;
  return(
    <nav style={{height:54,background:T.s1,borderBottom:`1px solid ${T.bd}`,display:'flex',alignItems:'center',padding:'0 22px',gap:14,flexShrink:0,position:'relative'}}>
      <div style={{fontWeight:800,fontSize:19,display:'flex',alignItems:'center',gap:7}}>
        <span style={{color:T.go}}>⚡</span>BrainStorm
      </div>
      {subtitle&&<span style={{color:T.tm,fontSize:12,background:T.s2,padding:'3px 10px',borderRadius:4,border:`1px solid ${T.bd}`,letterSpacing:0.5}}>{subtitle}</span>}
      {pct!=null&&(
        <div style={{display:'flex',alignItems:'center',gap:8,marginLeft:4}}>
          <div style={{width:120,height:4,background:T.bd,borderRadius:2,overflow:'hidden'}}>
            <div style={{width:`${pct}%`,height:'100%',background:T.go,borderRadius:2,transition:'width 0.4s ease'}}/>
          </div>
          <span style={{fontSize:11,color:T.tm}}>{pct}%</span>
        </div>
      )}
      <div style={{flex:1}}/>
      {roomCode&&(
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{color:T.tm,fontSize:11,letterSpacing:1}}>ROOM</span>
          <span style={{fontWeight:800,letterSpacing:5,color:T.pr,background:T.s2,padding:'5px 14px',borderRadius:6,border:`1px solid ${T.bd}`,fontSize:15}}>{roomCode}</span>
        </div>
      )}
      {onEndGame&&<button onClick={onEndGame} style={{background:'transparent',border:`1px solid ${T.rd}50`,color:T.rd,padding:'6px 14px',fontSize:13,borderRadius:6,marginLeft:8,fontFamily:'inherit',fontWeight:500}}>Spiel beenden</button>}
    </nav>
  );
}

/* ── SHARED: BTN ── */
function Btn({children,variant='primary',onClick,disabled,style={},size='md'}){
  const base={fontFamily:'inherit',fontWeight:600,borderRadius:'8px',display:'inline-flex',alignItems:'center',justifyContent:'center',gap:6,transition:'all 0.15s',border:'none'};
  const v={
    primary:{background:T.pr,color:'#fff'},
    secondary:{background:T.s2,color:T.tx,border:`1px solid ${T.bd}`},
    success:{background:'#16a34a',color:'#fff'},
    danger:{background:T.rd,color:'#fff'},
    ghost:{background:'transparent',color:T.tm,border:`1px solid ${T.bd}`},
    gold:{background:T.go,color:'#000'},
  };
  const s={sm:{padding:'5px 12px',fontSize:12},md:{padding:'9px 18px',fontSize:14},lg:{padding:'13px 28px',fontSize:16}};
  return(
    <button onClick={onClick} disabled={disabled} style={{...base,...v[variant],...s[size],...style}}
      onMouseEnter={e=>{if(!disabled)e.currentTarget.style.filter='brightness(1.12)'}}
      onMouseLeave={e=>e.currentTarget.style.filter='brightness(1)'}
    >{children}</button>
  );
}

/* ── BUILDER: MINI BOARD PREVIEW ── */
function BoardPreview({categories}){
  if(!categories.length) return(
    <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',color:T.tm,fontSize:13,flexDirection:'column',gap:8}}>
      <div style={{fontSize:28,opacity:0.3}}>⊞</div>
      <div>Board-Vorschau</div>
      <div style={{fontSize:11,opacity:0.6}}>Füge Kategorien hinzu</div>
    </div>
  );
  const maxQ=Math.max(...categories.map(c=>c.questions.length),1);
  return(
    <div style={{flex:1,overflowY:'auto',padding:'16px 12px'}}>
      <div style={{fontSize:10,letterSpacing:2,color:T.tm,marginBottom:10,fontWeight:700}}>BOARD-VORSCHAU</div>
      <div style={{display:'grid',gridTemplateColumns:`repeat(${categories.length},1fr)`,gridTemplateRows:`auto repeat(${maxQ},1fr)`,gap:4}}>
        {/* Row 0: headers */}
        {categories.map(cat=>(
          <div key={cat.id+'h'} style={{background:'#16213a',borderRadius:5,padding:'6px 3px',textAlign:'center',fontWeight:700,fontSize:10,letterSpacing:1,color:'#9ab0d8',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
            {cat.name||'—'}
          </div>
        ))}
        {/* Rows 1-N: questions row by row */}
        {Array.from({length:maxQ}).map((_,ri)=>
          categories.map(cat=>{
            const q=cat.questions[ri];
            return q?(
              <div key={q.id} style={{background:T.s1,border:`1px solid #1e2840`,borderRadius:5,display:'flex',alignItems:'center',justifyContent:'center',color:T.go,fontSize:15,fontWeight:800,minHeight:36}}>
                {q.points}
              </div>
            ):(
              <div key={`e-${cat.id}-${ri}`} style={{background:T.bg,border:`1px dashed ${T.bd}`,borderRadius:5,minHeight:36,opacity:0.3}}/>
            );
          })
        )}
      </div>
      <div style={{marginTop:12,fontSize:11,color:T.tm,display:'flex',gap:12}}>
        <span>{categories.length} Kategorien</span>
        <span>{categories.reduce((a,c)=>a+c.questions.length,0)} Fragen</span>
      </div>
    </div>
  );
}

/* ── BUILDER PAGE ── */
function BuilderPage({categories,onUpdate,onNext,toast}){
  const importRef=useRef();
  const addCat=()=>onUpdate([...categories,{id:`c${Date.now()}`,name:'Neue Kategorie',questions:[]}]);
  const renameCat=(id,name)=>onUpdate(categories.map(c=>c.id===id?{...c,name}:c));
  const deleteCat=(id)=>onUpdate(categories.filter(c=>c.id!==id));
  const addQ=(catId)=>onUpdate(categories.map(c=>c.id===catId?{...c,questions:[...c.questions,{id:`q${Date.now()}`,points:200,text:'',played:false}]}:c));
  const updateQ=(catId,q)=>onUpdate(categories.map(c=>c.id===catId?{...c,questions:c.questions.map(x=>x.id===q.id?q:x)}:c));
  const deleteQ=(catId,qId)=>onUpdate(categories.map(c=>c.id===catId?{...c,questions:c.questions.filter(q=>q.id!==qId)}:c));

  function goNext(){
    const hasEmpty=categories.some(c=>c.questions.some(q=>!q.text.trim()));
    if(hasEmpty){toast('Alle Fragen müssen einen Text haben','error');return;}
    onNext();
  }

  return(
    <div style={{flex:1,display:'flex',minHeight:0,overflow:'hidden'}}>
      {/* Left: editor */}
      <div style={{flex:1,overflowY:'auto',padding:'18px 22px',display:'flex',flexDirection:'column',gap:0,borderRight:`1px solid ${T.bd}`}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:18,flexShrink:0}}>
          <h1 style={{fontSize:19,fontWeight:700,flex:1}}>Quiz-Builder</h1>
          <Btn variant="secondary" size="sm" onClick={()=>importRef.current?.click()}>📂 Import</Btn>
          <input ref={importRef} type="file" accept=".json" style={{display:'none'}}/>
          <Btn variant="secondary" size="sm" disabled={!categories.length}>💾 Export</Btn>
          <Btn variant="secondary" onClick={addCat}>+ Kategorie</Btn>
          <Btn variant="success" onClick={goNext} disabled={!categories.length}>Zur Lobby →</Btn>
        </div>

        {!categories.length?(
          <div style={{textAlign:'center',color:T.tm,padding:56,border:`2px dashed ${T.bd}`,borderRadius:12}}>
            Noch keine Kategorien. Klicke auf „+ Kategorie" um zu starten.
          </div>
        ):(
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            {categories.map((cat,ci)=>(
              <div key={cat.id} style={{background:T.s1,border:`1px solid ${T.bd}`,borderRadius:10,padding:14,animation:'fadeIn 0.2s ease'}}>
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
                  <div style={{width:24,height:24,borderRadius:6,background:T.s2,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:T.tm,flexShrink:0}}>{ci+1}</div>
                  <input value={cat.name} onChange={e=>renameCat(cat.id,e.target.value)}
                    style={{background:'transparent',border:'none',borderBottom:`2px solid ${T.bd}`,color:T.tx,fontSize:16,fontWeight:700,flex:1,padding:'3px 0',outline:'none',borderRadius:0}}
                    onFocus={e=>e.target.style.borderBottomColor=T.pr}
                    onBlur={e=>e.target.style.borderBottomColor=T.bd}
                    placeholder="Kategoriename"
                  />
                  <span style={{color:T.tm,fontSize:11,whiteSpace:'nowrap'}}>{cat.questions.length} Fragen</span>
                  <button onClick={()=>deleteCat(cat.id)} style={{background:'none',border:`1px solid ${T.rd}40`,color:T.rd,padding:'3px 9px',fontSize:12,borderRadius:5,cursor:'pointer',opacity:0.7,fontFamily:'inherit'}}
                    onMouseEnter={e=>e.currentTarget.style.opacity='1'}
                    onMouseLeave={e=>e.currentTarget.style.opacity='0.7'}
                  >Löschen</button>
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:7,marginBottom:8}}>
                  {cat.questions.map(q=>(
                    <div key={q.id} style={{background:T.s2,border:`1px solid ${T.bd}`,borderRadius:7,padding:11}}>
                      <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:7}}>
                        <select value={q.points} onChange={e=>updateQ(cat.id,{...q,points:+e.target.value})}
                          style={{background:T.bg,color:T.go,border:`1px solid ${T.bd}`,borderRadius:5,padding:'4px 8px',fontSize:13,fontWeight:700}}>
                          {[100,200,300,400,500,600,800,1000].map(p=><option key={p} value={p}>{p}</option>)}
                        </select>
                        <span style={{color:T.tm,fontSize:11}}>Punkte</span>
                        <div style={{flex:1}}/>
                        <button onClick={()=>deleteQ(cat.id,q.id)} style={{background:'none',border:'none',color:T.tm,cursor:'pointer',fontSize:17,padding:'0 3px',lineHeight:1,fontFamily:'inherit'}}
                          onMouseEnter={e=>e.currentTarget.style.color=T.rd}
                          onMouseLeave={e=>e.currentTarget.style.color=T.tm}
                        >×</button>
                      </div>
                      <textarea placeholder="Fragetext *" value={q.text} onChange={e=>updateQ(cat.id,{...q,text:e.target.value})} rows={2}
                        style={{width:'100%',background:T.bg,border:`1px solid ${T.bd}`,borderRadius:6,color:T.tx,padding:'7px 10px',fontSize:14,resize:'vertical',outline:'none',fontFamily:'inherit',lineHeight:1.4}}
                      />
                      <textarea placeholder="Antwort (nur für Moderator)" value={q.answer||''} onChange={e=>updateQ(cat.id,{...q,answer:e.target.value})} rows={2}
                        style={{width:'100%',background:`${T.go}08`,border:`1px solid ${T.go}40`,borderRadius:6,color:`${T.go}cc`,padding:'7px 10px',fontSize:13,resize:'vertical',outline:'none',fontFamily:'inherit',lineHeight:1.4,marginTop:6}}
                      />
                      <div style={{display:'flex',gap:7,marginTop:7}}>
                        {['🖼 Bild','🎵 Audio','🎬 Video'].map(m=>(
                          <label key={m} style={{color:T.tm,fontSize:11,cursor:'pointer',padding:'3px 9px',border:`1px dashed ${T.bd}`,borderRadius:4,display:'flex',alignItems:'center',gap:3,transition:'all 0.12s'}}
                            onMouseEnter={e=>{e.currentTarget.style.borderColor=T.pr;e.currentTarget.style.color=T.tx}}
                            onMouseLeave={e=>{e.currentTarget.style.borderColor=T.bd;e.currentTarget.style.color=T.tm}}
                          >{m}<input type="file" style={{display:'none'}}/></label>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
                <button onClick={()=>addQ(cat.id)}
                  style={{width:'100%',background:'transparent',border:`1px dashed ${T.bd}`,color:T.tm,padding:'7px',fontSize:13,borderRadius:6,cursor:'pointer',transition:'all 0.12s',fontFamily:'inherit'}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor=T.pr;e.currentTarget.style.color=T.tx}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor=T.bd;e.currentTarget.style.color=T.tm}}
                >+ Frage hinzufügen</button>
              </div>
            ))}
          </div>
        )}
      </div>
      {/* Right: board preview */}
      <div style={{width:260,flexShrink:0,display:'flex',flexDirection:'column',background:T.bg}}>
        <BoardPreview categories={categories}/>
      </div>
    </div>
  );
}

/* ── LOBBY PAGE ── */
function LobbyPage({players,playerOrder,onReorder,onShuffle,onStart,toast}){
  const [dragging,setDragging]=useState(null);
  const [over,setOver]=useState(null);
  const [copied,setCopied]=useState(false);

  function handleDrop(targetId){
    if(!dragging||dragging===targetId)return;
    const o=[...playerOrder];
    const fi=o.indexOf(dragging),ti=o.indexOf(targetId);
    o.splice(fi,1);o.splice(ti,0,dragging);
    onReorder(o);setDragging(null);setOver(null);
  }
  function copyCode(){
    navigator.clipboard?.writeText('A3X9KL').catch(()=>{});
    setCopied(true);setTimeout(()=>setCopied(false),2000);
    toast('Room-Code kopiert!','success');
  }

  const ordered=playerOrder.map(id=>players.find(p=>p.id===id)).filter(Boolean);
  return(
    <div style={{flex:1,overflowY:'auto',padding:28}}>
      <div style={{maxWidth:660,margin:'0 auto',display:'flex',flexDirection:'column',gap:16}}>
        {/* Room code + QR */}
        <div style={{background:T.s1,border:`1px solid ${T.bd}`,borderRadius:14,padding:28,display:'flex',gap:24,alignItems:'center'}}>
          <div style={{flex:1}}>
            <div style={{color:T.tm,fontSize:10,letterSpacing:3,marginBottom:10,fontWeight:700}}>ROOM-CODE</div>
            <div style={{fontSize:58,fontWeight:800,letterSpacing:14,color:T.pr,marginBottom:14,lineHeight:1}}> A3X9KL</div>
            <div style={{color:T.tm,fontSize:13,lineHeight:1.7,marginBottom:16}}>Teile diesen Code mit deinen Spielern.</div>
            <button onClick={copyCode} style={{background:copied?T.gn:T.s2,color:copied?'#fff':T.tx,border:`1px solid ${copied?T.gn:T.bd}`,borderRadius:7,padding:'7px 16px',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit',transition:'all 0.2s',display:'flex',alignItems:'center',gap:6}}>
              {copied?'✓ Kopiert':'Code kopieren'}
            </button>
          </div>
          {/* QR placeholder */}
          <div style={{width:110,height:110,borderRadius:8,overflow:'hidden',border:`1px solid ${T.bd}`,flexShrink:0,position:'relative',background:T.s2}}>
            <svg width="110" height="110" viewBox="0 0 110 110" xmlns="http://www.w3.org/2000/svg">
              {Array.from({length:11}).map((_,i)=>(
                <line key={i} x1={i*10} y1="0" x2={i*10} y2="110" stroke="#252c40" strokeWidth="0.5"/>
              ))}
              {Array.from({length:11}).map((_,i)=>(
                <line key={i+'h'} x1="0" y1={i*10} x2="110" y2={i*10} stroke="#252c40" strokeWidth="0.5"/>
              ))}
              {/* QR corner squares */}
              {[[8,8],[8,78],[78,8]].map(([x,y],i)=>(
                <g key={i}>
                  <rect x={x} y={y} width="24" height="24" fill="none" stroke="#4f6ef7" strokeWidth="2.5" rx="2"/>
                  <rect x={x+6} y={y+6} width="12" height="12" fill="#4f6ef7" rx="1"/>
                </g>
              ))}
              <text x="55" y="62" textAnchor="middle" fontSize="9" fill="#6272a4" fontFamily="monospace">QR-CODE</text>
            </svg>
          </div>
        </div>

        {/* Players */}
        <div style={{background:T.s1,border:`1px solid ${T.bd}`,borderRadius:14,padding:18}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
            <h2 style={{fontSize:14,fontWeight:600}}>Spieler <span style={{color:T.tm,fontWeight:400,fontSize:13}}>({players.length})</span></h2>
            <div style={{display:'flex',gap:8}}>
              <Btn variant="secondary" size="sm" onClick={onShuffle}>🎲 Zufällig</Btn>
            </div>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {ordered.map((p,i)=>(
              <div key={p.id} draggable
                onDragStart={()=>setDragging(p.id)}
                onDragOver={e=>{e.preventDefault();setOver(p.id)}}
                onDrop={()=>handleDrop(p.id)}
                onDragEnd={()=>{setDragging(null);setOver(null)}}
                style={{display:'flex',alignItems:'center',gap:12,background:over===p.id?T.s2:T.bg,border:`1px solid ${over===p.id?T.pr:T.bd}`,borderRadius:8,padding:'10px 14px',cursor:'grab',opacity:dragging===p.id?0.35:1,transition:'all 0.12s'}}
              >
                <span style={{color:T.tm,fontSize:16,userSelect:'none',lineHeight:1}}>⠿</span>
                <div style={{width:28,height:28,borderRadius:'50%',background:T.s2,border:`1.5px solid ${T.bd}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,flexShrink:0,color:T.tm}}>
                  {p.name[0]}
                </div>
                <span style={{color:T.tm,fontSize:12,minWidth:22}}>#{i+1}</span>
                <span style={{flex:1,fontWeight:500}}>{p.name}</span>
                <span style={{fontSize:11,background:'#0a2e18',color:T.gn,padding:'3px 9px',borderRadius:20,fontWeight:600,display:'flex',alignItems:'center',gap:4}}>
                  <span style={{width:5,height:5,borderRadius:'50%',background:T.gn,display:'inline-block'}}/>online
                </span>
              </div>
            ))}
          </div>
          <div style={{marginTop:10,fontSize:11,color:T.tm}}>Reihenfolge per Drag & Drop anpassen</div>
        </div>

        <Btn variant="success" size="lg" onClick={onStart} style={{width:'100%',padding:'15px',fontSize:16,fontWeight:700,borderRadius:10,boxShadow:'0 4px 20px rgba(22,163,74,0.3)'}}>
          Spiel starten
        </Btn>
      </div>
    </div>
  );
}

/* ── CONTROL PAGE ── */
function ControlPage({categories,players,playerOrder,onNewGame,toast}){
  const [cats,setCats]=useState(()=>categories.map(c=>({...c,questions:c.questions.map(q=>({...q}))})));
  const [pls,setPls]=useState(players.map(p=>({...p})));
  const [activeQ,setActiveQ]=useState(null);
  const [phase,setPhase]=useState('QUESTION_OPEN');
  const [activeIdx,setActiveIdx]=useState(0);
  const [buzzedPlayer,setBuzzedPlayer]=useState(null);
  const [buzzedPlayers,setBuzzedPlayers]=useState([]); // IDs aller bereits gebuzzerten Spieler
  const [editingScore,setEditingScore]=useState(null);
  const [scoreDraft,setScoreDraft]=useState('');
  const [deltas,setDeltas]=useState({});
  const [showAnswer,setShowAnswer]=useState(false);

  const ordered=playerOrder.map(id=>pls.find(p=>p.id===id)).filter(Boolean);
  const activePlayer=ordered[activeIdx%ordered.length];
  const judgingPlayer=buzzedPlayer??activePlayer;
  const totalQ=cats.reduce((a,c)=>a+c.questions.length,0);
  const playedQ=cats.reduce((a,c)=>a+c.questions.filter(q=>q.played).length,0);
  const allPlayed=playedQ===totalQ&&totalQ>0;

  function flashDelta(pid,val){
    const key=Date.now();
    setDeltas(d=>({...d,[pid]:{val,key}}));
    setTimeout(()=>setDeltas(d=>{const n={...d};delete n[pid];return n;}),1800);
  }

  function openQ(q,catName){
    if(q.played||activeQ)return;
    setActiveQ({question:q,categoryName:catName});
    setPhase('ACTIVE_PLAYER_ANSWERING');
    setBuzzedPlayer(null);
    setBuzzedPlayers([]);
    setShowAnswer(false);
  }

  function closeQ(){
    setActiveQ(null);setPhase('QUESTION_OPEN');
    setBuzzedPlayer(null);setBuzzedPlayers([]);setShowAnswer(false);
    toast('Frage geschlossen — kein Punkt vergeben','warning');
  }

  function openBuzzerPhase(alreadyBuzzed){
    setPhase('BUZZER_PHASE');setBuzzedPlayer(null);
    const eligible=ordered.filter(p=>p.id!==activePlayer?.id&&!alreadyBuzzed.includes(p.id));
    if(eligible.length===0){
      // Niemand mehr übrig
      setTimeout(()=>{setActiveQ(null);setPhase('QUESTION_OPEN');setBuzzedPlayer(null);setBuzzedPlayers([]);setShowAnswer(false);
        toast('Alle Spieler haben versucht — Frage wird geschlossen','warning');},800);
      return;
    }
    setTimeout(()=>setBuzzedPlayer({...eligible[Math.floor(Math.random()*eligible.length)]}),1200);
  }

  function judge(correct){
    if(!activeQ||!judgingPlayer)return;
    const pts=activeQ.question.points;

    if(buzzedPlayer){
      // Gebuzzerte Spieler: richtig = halbe Punkte+, falsch = halbe Punkte-
      const delta=correct?Math.round(pts/2):-Math.round(pts/2);
      setPls(prev=>prev.map(p=>p.id===judgingPlayer.id?{...p,score:p.score+delta}:p));
      flashDelta(judgingPlayer.id,delta);
      toast(correct?`✓ ${judgingPlayer.name} +${delta} Punkte (½)`:`✗ ${judgingPlayer.name} ${delta} Punkte`,correct?'success':'error');
      if(correct){finish();}
      else{
        const newBuzzed=[...buzzedPlayers,buzzedPlayer.id];
        setBuzzedPlayers(newBuzzed);
        openBuzzerPhase(newBuzzed);
      }
    } else {
      // Aktiver Spieler: richtig = volle Punkte, falsch = halbe Punkte-
      const delta=correct?pts:-Math.round(pts/2);
      setPls(prev=>prev.map(p=>p.id===judgingPlayer.id?{...p,score:p.score+delta}:p));
      flashDelta(judgingPlayer.id,delta);
      toast(correct?`✓ ${judgingPlayer.name} +${delta} Punkte`:`✗ ${judgingPlayer.name} ${delta} Punkte`,correct?'success':'error');
      if(correct){finish();}
      else{openBuzzerPhase([]);}
    }
  }

  function finish(){
    setCats(prev=>prev.map(c=>({...c,questions:c.questions.map(q=>q.id===activeQ.question.id?{...q,played:true}:q)})));
    setActiveQ(null);setPhase('QUESTION_OPEN');setActiveIdx(i=>i+1);
    setBuzzedPlayer(null);setBuzzedPlayers([]);setShowAnswer(false);
  }

  function saveScore(pid){
    const v=parseInt(scoreDraft,10);
    if(!isNaN(v)){
      const old=pls.find(p=>p.id===pid)?.score??0;
      flashDelta(pid,v-old);
      setPls(prev=>prev.map(p=>p.id===pid?{...p,score:v}:p));
      toast('Score angepasst','info');
    }
    setEditingScore(null);
  }

  // Keyboard shortcuts
  useEffect(()=>{
    function onKey(e){
      if(!activeQ||!judgingPlayer)return;
      if(!(phase==='ACTIVE_PLAYER_ANSWERING'||(phase==='BUZZER_PHASE'&&buzzedPlayer)))return;
      if(e.key==='Enter')judge(true);
      if(e.key==='Escape')judge(false);
    }
    window.addEventListener('keydown',onKey);
    return()=>window.removeEventListener('keydown',onKey);
  },[activeQ,judgingPlayer,phase,buzzedPlayer,ordered,activePlayer]);

  if(allPlayed){
    const sorted=[...pls].sort((a,b)=>b.score-a.score);
    return(
      <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:40,textAlign:'center',animation:'fadeIn 0.4s ease'}}>
        <div style={{fontSize:72,marginBottom:8}}>🏆</div>
        <h1 style={{fontSize:38,fontWeight:800,marginBottom:6}}>Spiel vorbei!</h1>
        <p style={{color:T.tm,marginBottom:32,fontSize:15}}>Herzlichen Glückwunsch an alle Teilnehmer</p>
        <div style={{display:'flex',flexDirection:'column',gap:9,width:'100%',maxWidth:480,marginBottom:32}}>
          {sorted.map((p,i)=>(
            <div key={p.id} style={{display:'flex',alignItems:'center',gap:16,background:i===0?'#1c1600':T.s1,border:`2px solid ${i===0?T.go:T.bd}`,borderRadius:10,padding:'14px 20px',animation:`fadeIn ${0.2+i*0.08}s ease`}}>
              <span style={{fontSize:24,minWidth:40}}>{i===0?'🥇':i===1?'🥈':i===2?'🥉':`#${i+1}`}</span>
              <span style={{flex:1,fontSize:17,fontWeight:600,textAlign:'left'}}>{p.name}</span>
              <span style={{fontWeight:800,color:p.score<0?T.rd:T.pr,fontSize:20}}>{p.score}<span style={{fontSize:12,fontWeight:400,color:T.tm,marginLeft:3}}>Pts</span></span>
            </div>
          ))}
        </div>
        <Btn variant="primary" size="lg" onClick={onNewGame}>Neues Spiel</Btn>
      </div>
    );
  }

  const phaseLabel={QUESTION_OPEN:'Wähle eine Frage',ACTIVE_PLAYER_ANSWERING:'Spieler antwortet',BUZZER_PHASE:'Buzzer-Phase'}[phase]||phase;

  return(
    <div style={{flex:1,display:'grid',gridTemplateColumns:'1fr 340px',minHeight:0,overflow:'hidden'}}>
      {/* Board */}
      <div style={{display:'flex',flexDirection:'column',padding:20,borderRight:`1px solid ${T.bd}`,minHeight:0,overflow:'hidden',gap:10}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
          <span style={{fontSize:11,fontWeight:700,letterSpacing:2,color:T.tm}}>BOARD</span>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            {activeQ&&<span style={{fontSize:12,color:T.go,display:'flex',alignItems:'center',gap:5}}><span>⌨</span><span style={{color:T.tm}}>Enter = Richtig · Esc = Falsch</span></span>}
            <span style={{fontSize:12,color:T.tm}}>{playedQ}/{totalQ} gespielt</span>
          </div>
        </div>
        {(()=>{
          const numRows=cats[0]?.questions.length||5;
          return(
            <div style={{
              display:'grid',
              gridTemplateColumns:`repeat(${cats.length},1fr)`,
              gridTemplateRows:`auto repeat(${numRows},1fr)`,
              gap:6,flex:1,minHeight:0
            }}>
              {/* Row 0: category headers */}
              {cats.map(cat=>(
                <div key={cat.id+'h'} style={{background:'#16213a',border:`1px solid #243050`,borderRadius:8,padding:'10px 6px',textAlign:'center',fontWeight:700,fontSize:11,letterSpacing:1.5,color:'#9ab0d8',display:'flex',alignItems:'center',justifyContent:'center'}}>
                  {cat.name}
                </div>
              ))}
              {/* Rows 1-N: questions, row by row */}
              {Array.from({length:numRows}).map((_,ri)=>
                cats.map(cat=>{
                  const q=cat.questions[ri];
                  if(!q)return <div key={`empty-${cat.id}-${ri}`} style={{background:T.bg,borderRadius:8}}/>;
                  const isAct=activeQ?.question.id===q.id;
                  return(
                    <button key={q.id} onClick={()=>openQ(q,cat.name)} disabled={q.played||!!activeQ}
                      style={{
                        background:q.played?T.bg:isAct?'#1e1a00':T.s1,
                        border:`2px solid ${q.played?T.bd:isAct?T.go:'#1c2440'}`,
                        borderRadius:8,color:q.played?'transparent':T.go,
                        fontSize:26,fontWeight:800,
                        cursor:q.played||activeQ?'default':'pointer',
                        transition:'all 0.15s',
                        animation:isAct?'pulse 1.5s infinite':'none',
                        display:'flex',alignItems:'center',justifyContent:'center',
                      }}
                      onMouseEnter={e=>{if(!q.played&&!activeQ){e.currentTarget.style.borderColor=T.pr;e.currentTarget.style.background='#1a2240';e.currentTarget.style.transform='scale(1.03)'}}}
                      onMouseLeave={e=>{if(!q.played&&!activeQ){e.currentTarget.style.borderColor='#1c2440';e.currentTarget.style.background=T.s1;e.currentTarget.style.transform='scale(1)'}}}
                    >{q.played?'':q.points}</button>
                  );
                })
              )}
            </div>
          );
        })()}
      </div>

      {/* Sidebar */}
      <div style={{display:'flex',flexDirection:'column',overflowY:'auto',background:T.s1}}>
        {/* Active question */}
        <div style={{padding:'16px 18px',borderBottom:`1px solid ${T.bd}`,minHeight:90}}>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:2,color:T.tm,marginBottom:8}}>AKTIVE FRAGE</div>
          {activeQ?(
            <div style={{animation:'fadeIn 0.2s ease'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                <span style={{fontSize:11,color:T.tm,letterSpacing:1.5,fontWeight:600}}>{activeQ.categoryName}</span>
                <span style={{color:T.go,fontWeight:800,fontSize:16,background:`${T.go}15`,padding:'2px 10px',borderRadius:4}}>{activeQ.question.points} Pts</span>
              </div>
              <p style={{fontSize:16,fontWeight:600,lineHeight:1.5,color:T.tx,marginBottom:10}}>{activeQ.question.text}</p>
              {/* Answer reveal */}
              <div style={{borderTop:`1px solid ${T.bd}`,paddingTop:10}}>
                <button onClick={()=>setShowAnswer(s=>!s)}
                  style={{background:'transparent',border:`1px solid ${T.go}50`,color:T.go,borderRadius:6,padding:'5px 12px',fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',gap:6,marginBottom:showAnswer?8:0,transition:'all 0.15s'}}
                  onMouseEnter={e=>e.currentTarget.style.background=`${T.go}15`}
                  onMouseLeave={e=>e.currentTarget.style.background='transparent'}
                >
                  {showAnswer?'▲ Antwort verbergen':'▼ Antwort aufdecken'}
                </button>
                {showAnswer&&activeQ.question.answer&&(
                  <div style={{background:`${T.go}10`,border:`1px solid ${T.go}40`,borderRadius:6,padding:'8px 12px',fontSize:13,color:`${T.go}dd`,lineHeight:1.5,animation:'fadeIn 0.2s ease'}}>
                    {activeQ.question.answer}
                  </div>
                )}
                {showAnswer&&!activeQ.question.answer&&(
                  <div style={{color:T.tm,fontSize:12,fontStyle:'italic'}}>Keine Antwort hinterlegt</div>
                )}
              </div>
            </div>
          ):(
            <div style={{color:T.tm,fontSize:13,paddingTop:8}}>Klicke auf eine Frage im Board</div>
          )}
        </div>

        {/* Phase panel */}
        <div style={{padding:'14px 18px',borderBottom:`1px solid ${T.bd}`,display:'flex',flexDirection:'column',gap:10}}>
          <div style={{display:'flex',alignItems:'center',gap:7}}>
            <div style={{width:7,height:7,borderRadius:'50%',background:phase==='BUZZER_PHASE'?T.go:phase==='ACTIVE_PLAYER_ANSWERING'?T.gn:T.tm,flexShrink:0,boxShadow:`0 0 7px ${phase==='BUZZER_PHASE'?T.go:phase==='ACTIVE_PLAYER_ANSWERING'?T.gn:T.bd}`}}/>
            <span style={{fontSize:11,color:T.tm,letterSpacing:1,fontWeight:600}}>{phaseLabel}</span>
          </div>

          {phase==='ACTIVE_PLAYER_ANSWERING'&&activePlayer&&(
            <div style={{display:'flex',alignItems:'center',gap:10,background:T.s2,borderRadius:8,padding:'10px 12px'}}>
              <div style={{width:36,height:36,borderRadius:'50%',background:`${T.gn}18`,border:`2px solid ${T.gn}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,fontWeight:800,color:T.gn,flexShrink:0}}>
                {activePlayer.name[0]}
              </div>
              <div>
                <div style={{fontSize:11,color:T.tm}}>Aktiver Spieler</div>
                <div style={{fontWeight:700,fontSize:15}}>{activePlayer.name}</div>
              </div>
            </div>
          )}

          {phase==='BUZZER_PHASE'&&(
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              <div style={{background:buzzedPlayer?`${T.go}10`:T.s2,border:`1px solid ${buzzedPlayer?T.go:T.bd}`,borderRadius:8,padding:'10px 12px',transition:'all 0.3s',animation:buzzedPlayer?'buzz 0.4s ease':'none'}}>
                {buzzedPlayer?(
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <div style={{width:36,height:36,borderRadius:'50%',background:`${T.go}20`,border:`2px solid ${T.go}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,fontWeight:800,color:T.go,flexShrink:0}}>
                      {buzzedPlayer.name[0]}
                    </div>
                    <div>
                      <div style={{fontSize:11,color:T.tm}}>🔔 Gebuzzert</div>
                      <div style={{fontWeight:700,fontSize:15}}>{buzzedPlayer.name}</div>
                    </div>
                  </div>
                ):(
                  <div style={{display:'flex',alignItems:'center',gap:8,color:T.go}}>
                    <span style={{fontSize:18}}>⏳</span>
                    <span style={{fontSize:14,fontWeight:500}}>Warte auf Buzzer…</span>
                  </div>
                )}
              </div>
              {!buzzedPlayer&&(
                <div style={{display:'flex',flexDirection:'column',gap:6}}>
                  {buzzedPlayers.length>0&&(
                    <div style={{fontSize:11,color:T.tm}}>Bereits gebuzzert: {buzzedPlayers.map(id=>ordered.find(p=>p.id===id)?.name).filter(Boolean).join(', ')}</div>
                  )}
                  <button onClick={closeQ} style={{background:'transparent',border:`1px solid ${T.bd}`,color:T.tm,borderRadius:7,padding:'8px',fontSize:13,cursor:'pointer',fontFamily:'inherit',fontWeight:500,transition:'all 0.15s'}}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor=T.rd;e.currentTarget.style.color=T.rd}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor=T.bd;e.currentTarget.style.color=T.tm}}
                  >Frage schließen — niemand gebuzzert</button>
                </div>
              )}
            </div>
          )}

          {activeQ&&judgingPlayer&&(phase==='ACTIVE_PLAYER_ANSWERING'||(phase==='BUZZER_PHASE'&&buzzedPlayer))&&(
            <div style={{display:'flex',flexDirection:'column',gap:7}}>
              <div style={{fontSize:12,color:T.tm}}>Antwort von <strong style={{color:T.tx}}>{judgingPlayer.name}</strong></div>
              <button onClick={()=>judge(true)} style={{background:'#16a34a',color:'#fff',border:'none',borderRadius:8,fontSize:17,fontWeight:700,padding:'13px',cursor:'pointer',boxShadow:'0 4px 16px rgba(22,163,74,0.3)',transition:'all 0.15s',fontFamily:'inherit'}}
                onMouseEnter={e=>e.currentTarget.style.filter='brightness(1.12)'}
                onMouseLeave={e=>e.currentTarget.style.filter='brightness(1)'}
              >✓ Richtig</button>
              <button onClick={()=>judge(false)} style={{background:T.rd,color:'#fff',border:'none',borderRadius:8,fontSize:17,fontWeight:700,padding:'13px',cursor:'pointer',boxShadow:`0 4px 16px ${T.rd}40`,transition:'all 0.15s',fontFamily:'inherit'}}
                onMouseEnter={e=>e.currentTarget.style.filter='brightness(1.12)'}
                onMouseLeave={e=>e.currentTarget.style.filter='brightness(1)'}
              >✗ Falsch</button>
            </div>
          )}
        </div>

        {/* Scores */}
        <div style={{padding:'14px 18px',flex:1}}>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:2,color:T.tm,marginBottom:10}}>SCORES</div>
          {ordered.map((p,i)=>(
            <div key={p.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:`1px solid ${T.bd}`,position:'relative'}}>
              <div style={{width:28,height:28,borderRadius:'50%',background:p.id===activePlayer?.id?`${T.gn}18`:T.s2,border:`1.5px solid ${p.id===activePlayer?.id?T.gn:T.bd}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,flexShrink:0,color:p.id===activePlayer?.id?T.gn:T.tm}}>
                {p.name[0]}
              </div>
              <span style={{flex:1,fontSize:14,fontWeight:p.id===activePlayer?.id?600:400}}>{p.name}</span>
              <div style={{position:'relative'}}>
                {deltas[p.id]&&(
                  <span key={deltas[p.id].key} style={{position:'absolute',right:0,top:-4,fontWeight:800,fontSize:15,color:deltas[p.id].val>0?T.gn:T.rd,animation:'floatUp 1.8s ease-out forwards',whiteSpace:'nowrap',pointerEvents:'none'}}>
                    {deltas[p.id].val>0?'+':''}{deltas[p.id].val}
                  </span>
                )}
                {editingScore===p.id?(
                  <div style={{display:'flex',gap:4,alignItems:'center'}}>
                    <input type="number" value={scoreDraft} onChange={e=>setScoreDraft(e.target.value)}
                      onKeyDown={e=>e.key==='Enter'&&saveScore(p.id)}
                      autoFocus style={{width:64,padding:'4px 6px',fontSize:13,borderRadius:5}}
                    />
                    <button onClick={()=>saveScore(p.id)} style={{background:T.pr,color:'#fff',border:'none',padding:'4px 8px',borderRadius:5,cursor:'pointer',fontSize:12,fontFamily:'inherit'}}>✓</button>
                    <button onClick={()=>setEditingScore(null)} style={{background:T.s2,color:T.tm,border:`1px solid ${T.bd}`,padding:'4px 7px',borderRadius:5,cursor:'pointer',fontSize:12,fontFamily:'inherit'}}>✕</button>
                  </div>
                ):(
                  <span onClick={()=>{setEditingScore(p.id);setScoreDraft(String(p.score))}} title="Klicken zum Bearbeiten"
                    style={{fontWeight:700,fontSize:15,color:p.score<0?T.rd:T.pr,cursor:'pointer',minWidth:50,textAlign:'right',display:'block'}}
                  >{p.score}</span>
                )}
              </div>
            </div>
          ))}
          <div style={{marginTop:12,fontSize:11,color:T.tm,lineHeight:1.6}}>Score anklicken zum Bearbeiten</div>
        </div>
      </div>
    </div>
  );
}

/* ── APP ── */
function App(){
  const [page,setPage]=useState('builder');
  const [cats,setCats]=useState(INIT_CATS);
  const [players]=useState(INIT_PLAYERS);
  const [order,setOrder]=useState(INIT_PLAYERS.map(p=>p.id));
  const {toasts,add:toast}=useToasts();

  function shuffle(){setOrder(o=>[...o].sort(()=>Math.random()-0.5));}
  const totalQ=cats.reduce((a,c)=>a+c.questions.length,0);

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden',background:T.bg}}>
      <Nav
        subtitle={{builder:'Quiz-Builder',lobby:'Lobby',control:'Control Panel'}[page]}
        roomCode={page!=='builder'?'A3X9KL':null}
        onEndGame={page==='control'?()=>setPage('builder'):null}
        progress={page==='control'?undefined:undefined}
      />
      {page==='builder'&&<BuilderPage categories={cats} onUpdate={setCats} onNext={()=>setPage('lobby')} toast={toast}/>}
      {page==='lobby'&&<LobbyPage players={players} playerOrder={order} onReorder={setOrder} onShuffle={shuffle} onStart={()=>setPage('control')} toast={toast}/>}
      {page==='control'&&<ControlPage categories={cats} players={players} playerOrder={order} toast={toast} onNewGame={()=>{setCats(INIT_CATS);setPage('builder');}}/>}
      <Toasts toasts={toasts}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
