<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BrainStorm — Spieler</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0b0d14;color:#e4e8f5;font-family:'Outfit',system-ui,sans-serif;font-size:15px;min-height:100vh;overflow:hidden}
button{cursor:pointer;border:none;font-family:inherit;transition:all 0.15s}
button:disabled{opacity:0.35;cursor:not-allowed}
input{font-family:inherit;outline:none;transition:border-color 0.2s,box-shadow 0.2s}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#252c40;border-radius:3px}

@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInFast{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.94)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}60%{opacity:1;transform:translateY(-24px) scale(1.1)}100%{opacity:0;transform:translateY(-44px) scale(0.9)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulseRed{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.7)}50%{box-shadow:0 0 0 22px rgba(239,68,68,0)}}
@keyframes pulseGold{0%,100%{box-shadow:0 0 20px rgba(240,180,41,0.4)}50%{box-shadow:0 0 50px rgba(240,180,41,0.8)}}
@keyframes buzzShake{0%,100%{transform:scale(1) rotate(0)}20%{transform:scale(1.07) rotate(-2deg)}40%{transform:scale(1.07) rotate(2deg)}70%{transform:scale(1.03) rotate(-1deg)}}
@keyframes rankIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes ping{0%{transform:scale(1);opacity:1}100%{transform:scale(2.5);opacity:0}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

const T={bg:'#0b0d14',s1:'#131720',s2:'#1b2030',bd:'#252c40',tx:'#e4e8f5',tm:'#6272a4',pr:'#4f6ef7',go:'#f0b429',gn:'#22c55e',rd:'#ef4444'};

const MOCK_BOARD=[
  {id:'c1',name:'WEB',questions:[
    {id:'q11',points:100,played:true},{id:'q12',points:200,played:false},
    {id:'q13',points:300,played:false},{id:'q14',points:400,played:false},{id:'q15',points:500,played:false},
  ]},
  {id:'c2',name:'REACT',questions:[
    {id:'q21',points:100,played:false},{id:'q22',points:200,played:true},
    {id:'q23',points:300,played:false},{id:'q24',points:400,played:false},{id:'q25',points:500,played:false},
  ]},
  {id:'c3',name:'CSS',questions:[
    {id:'q31',points:100,played:false},{id:'q32',points:200,played:false},
    {id:'q33',points:300,played:true},{id:'q34',points:400,played:false},{id:'q35',points:500,played:false},
  ]},
  {id:'c4',name:'NODE.JS',questions:[
    {id:'q41',points:100,played:false},{id:'q42',points:200,played:false},
    {id:'q43',points:300,played:false},{id:'q44',points:400,played:false},{id:'q45',points:500,played:false},
  ]},
  {id:'c5',name:'GIT',questions:[
    {id:'q51',points:100,played:false},{id:'q52',points:200,played:false},
    {id:'q53',points:300,played:false},{id:'q54',points:400,played:false},{id:'q55',points:500,played:false},
  ]},
];

const MOCK_QUESTIONS=[
  {category:'REACT',points:300,text:'Was macht useEffect in React?'},
  {category:'WEB',points:200,text:'Was ist ein CSS-Selektor?'},
  {category:'GIT',points:400,text:'Was ist ein Pull Request?'},
];

/* ── JOIN PAGE ── */
function JoinPage({onJoin}){
  const [code,setCode]=useState('');
  const [name,setName]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const codeRef=useRef();
  useEffect(()=>codeRef.current?.focus(),[]);

  function submit(){
    if(code.length!==6){setErr('Room-Code muss genau 6 Zeichen lang sein');return;}
    if(!name.trim()){setErr('Bitte gib deinen Namen ein');return;}
    setLoading(true);setErr('');
    setTimeout(()=>{setLoading(false);onJoin(name.trim());},900);
  }

  const codeOk=code.length===6;
  const nameOk=name.trim().length>0;

  return(
    <div style={{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:T.bg}}>
      <div style={{width:420,animation:'scaleIn 0.3s ease'}}>
        <div style={{textAlign:'center',marginBottom:36}}>
          <div style={{fontSize:46,fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center',gap:10,marginBottom:10}}>
            <span style={{color:T.go}}>⚡</span>BrainStorm
          </div>
          <div style={{color:T.tm,fontSize:14}}>Gib deinen Room-Code und Namen ein</div>
        </div>

        <div style={{background:T.s1,border:`1px solid ${T.bd}`,borderRadius:16,padding:32,display:'flex',flexDirection:'column',gap:20}}>
          <div>
            <div style={{fontSize:10,fontWeight:700,letterSpacing:2,color:T.tm,marginBottom:8}}>ROOM-CODE</div>
            <input ref={codeRef} value={code}
              onChange={e=>setCode(e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,6))}
              onKeyDown={e=>e.key==='Enter'&&submit()}
              placeholder="A3X9KL"
              maxLength={6}
              style={{width:'100%',background:T.bg,border:`2px solid ${codeOk?T.gn:code?T.pr:T.bd}`,borderRadius:10,color:T.tx,padding:'14px 18px',fontSize:28,fontWeight:800,letterSpacing:12,textAlign:'center',boxShadow:codeOk?`0 0 0 3px ${T.gn}20`:code?`0 0 0 3px ${T.pr}20`:'none'}}
            />
            {/* Character dots */}
            <div style={{display:'flex',justifyContent:'center',gap:6,marginTop:8}}>
              {Array.from({length:6}).map((_,i)=>(
                <div key={i} style={{width:8,height:8,borderRadius:'50%',background:i<code.length?T.pr:T.bd,transition:'background 0.15s'}}/>
              ))}
            </div>
          </div>

          <div>
            <div style={{fontSize:10,fontWeight:700,letterSpacing:2,color:T.tm,marginBottom:8}}>DEIN NAME</div>
            <input value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}
              placeholder="Wie soll dich das Spiel nennen?"
              style={{width:'100%',background:T.bg,border:`2px solid ${nameOk?T.pr:T.bd}`,borderRadius:10,color:T.tx,padding:'13px 16px',fontSize:16,fontWeight:500,boxShadow:nameOk?`0 0 0 3px ${T.pr}20`:'none'}}
            />
          </div>

          {err&&<div style={{color:T.rd,fontSize:13,textAlign:'center',background:`${T.rd}10`,border:`1px solid ${T.rd}30`,borderRadius:7,padding:'8px'}}>{err}</div>}

          <button onClick={submit} disabled={loading}
            style={{background:loading?T.s2:T.pr,color:loading?T.tm:'#fff',borderRadius:10,padding:'15px',fontSize:17,fontWeight:700,boxShadow:loading?'none':`0 4px 20px ${T.pr}40`,display:'flex',alignItems:'center',justifyContent:'center',gap:8,marginTop:4}}
            onMouseEnter={e=>{if(!loading)e.currentTarget.style.filter='brightness(1.12)'}}
            onMouseLeave={e=>e.currentTarget.style.filter='brightness(1)'}
          >
            {loading?(
              <>
                <div style={{width:18,height:18,border:`2px solid ${T.bd}`,borderTopColor:T.pr,borderRadius:'50%',animation:'spin 0.8s linear infinite'}}/>
                Verbinde…
              </>
            ):'Beitreten'}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── WAITING PAGE ── */
function WaitingPage({myName,onStart}){
  const players=[{name:myName,me:true},{name:'Ben',me:false},{name:'Clara',me:false},{name:'David',me:false}];
  const [count,setCount]=useState(1);
  useEffect(()=>{
    const t=setInterval(()=>setCount(c=>Math.min(c+1,players.length)),1200);
    return()=>clearInterval(t);
  },[]);

  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:T.bg,gap:28,animation:'fadeIn 0.3s ease'}}>
      {/* Brand + status */}
      <div style={{textAlign:'center'}}>
        <div style={{fontSize:30,fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center',gap:8,marginBottom:12}}>
          <span style={{color:T.go}}>⚡</span>BrainStorm
        </div>
        <div style={{color:T.go,fontWeight:700,fontSize:19,marginBottom:6}}>Warte auf den Moderator…</div>
        <div style={{color:T.tm,fontSize:13}}>
          Als <strong style={{color:T.tx}}>{myName}</strong> verbunden ·
          Room <strong style={{color:T.pr,letterSpacing:3,marginLeft:4}}>A3X9KL</strong>
        </div>
      </div>

      {/* Animated connection indicator */}
      <div style={{position:'relative',width:56,height:56,display:'flex',alignItems:'center',justifyContent:'center'}}>
        <div style={{position:'absolute',inset:0,borderRadius:'50%',background:`${T.gn}20`,animation:'ping 1.5s ease-out infinite'}}/>
        <div style={{width:48,height:48,border:`3px solid ${T.bd}`,borderTopColor:T.pr,borderRadius:'50%',animation:'spin 1s linear infinite'}}/>
      </div>

      {/* Player list */}
      <div style={{background:T.s1,border:`1px solid ${T.bd}`,borderRadius:14,padding:20,width:400}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:2,color:T.tm}}>SPIELER</div>
          <div style={{fontSize:12,color:T.tm}}>{count}/{players.length} verbunden</div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:7}}>
          {players.map((p,i)=>(
            <div key={p.name} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',background:T.bg,borderRadius:8,border:`1px solid ${p.me?T.gn:T.bd}`,opacity:i<count?1:0.3,transition:'opacity 0.4s ease',animation:i<count?`fadeIn 0.3s ${i*0.1}s ease both`:'none'}}>
              <div style={{width:30,height:30,borderRadius:'50%',background:p.me?`${T.gn}20`:T.s2,border:`2px solid ${p.me?T.gn:T.bd}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700,color:p.me?T.gn:T.tm,flexShrink:0}}>
                {p.name[0]}
              </div>
              <span style={{flex:1,fontWeight:p.me?700:400,color:p.me?T.tx:T.tm}}>{p.name}</span>
              {p.me&&<span style={{fontSize:11,color:T.pr,fontWeight:600}}>du</span>}
              {i<count&&<span style={{width:7,height:7,borderRadius:'50%',background:T.gn,display:'block',flexShrink:0}}/>}
            </div>
          ))}
        </div>
      </div>

      <button onClick={onStart} style={{background:'transparent',border:`1px solid ${T.bd}`,color:T.tm,borderRadius:8,padding:'8px 22px',fontSize:13,fontFamily:'inherit',cursor:'pointer'}}
        onMouseEnter={e=>{e.currentTarget.style.borderColor=T.pr;e.currentTarget.style.color=T.pr}}
        onMouseLeave={e=>{e.currentTarget.style.borderColor=T.bd;e.currentTarget.style.color=T.tm}}
      >Demo: Spiel starten →</button>
    </div>
  );
}

/* ── GAME PAGE ── */
function GamePage({myName,onEnd}){
  const [players,setPlayers]=useState([
    {id:'p1',name:myName,score:200},{id:'p2',name:'Ben',score:0},
    {id:'p3',name:'Clara',score:-100},{id:'p4',name:'David',score:300},
  ]);
  const [board,setBoard]=useState(MOCK_BOARD.map(c=>({...c,questions:c.questions.map(q=>({...q}))})));
  // phase: 'board' | 'answering-me' | 'answering-other' | 'buzzer' | 'buzzed-me' | 'buzzed-other'
  const [phase,setPhase]=useState('board');
  const [activeQ,setActiveQ]=useState(null);
  const [activePlayerName,setActivePlayerName]=useState('Anna');
  const [hasBuzzed,setHasBuzzed]=useState(false);
  const [buzzedBy,setBuzzedBy]=useState(null);
  const [scoreDelta,setScoreDelta]=useState(null);
  const [qIdx,setQIdx]=useState(0);
  const [playedQId,setPlayedQId]=useState(null);

  const me=players.find(p=>p.name===myName)||players[0];
  const leaderboard=[...players].sort((a,b)=>b.score-a.score);
  const totalQ=board.reduce((a,c)=>a+c.questions.length,0);
  const playedQ=board.reduce((a,c)=>a+c.questions.filter(q=>q.played).length,0);
  const showOverlay=phase!=='board';

  function flashDelta(pid,val){
    setScoreDelta({pid,val,key:Date.now()});
    setTimeout(()=>setScoreDelta(null),2000);
  }

  function demoOpen(){
    const q=MOCK_QUESTIONS[qIdx%MOCK_QUESTIONS.length];
    setActiveQ(q);setHasBuzzed(false);setBuzzedBy(null);
    // alternate between "me" and "other" as active
    if(qIdx%2===0){setActivePlayerName(myName);setPhase('answering-me');}
    else{setActivePlayerName('Ben');setPhase('answering-other');}
  }
  function demoBuzzer(){setPhase('buzzer');setHasBuzzed(false);setBuzzedBy(null);}
  function handleBuzz(){
    if(phase!=='buzzer'||hasBuzzed)return;
    setHasBuzzed(true);setBuzzedBy(myName);setPhase('buzzed-me');
  }
  function demoOtherBuzz(){setPhase('buzzed-other');setBuzzedBy('David');}
  function demoCorrect(half=false){
    const pts=activeQ?.points||0;
    const delta=half?Math.round(pts/2):pts;
    flashDelta(me.id,delta);
    setPlayers(p=>p.map(x=>x.id===me.id?{...x,score:x.score+delta}:x));
    closeQ(true);
  }
  function demoWrong(){
    const delta=-Math.round((activeQ?.points||0)/2);
    flashDelta(me.id,delta);
    setPlayers(p=>p.map(x=>x.id===me.id?{...x,score:x.score+delta}:x));
    demoBuzzer();
  }
  function closeQ(played=false){
    if(played&&activeQ){
      setBoard(b=>b.map(c=>({...c,questions:c.questions.map(q=>q.points===activeQ.points&&q.category===activeQ.category?{...q,played:true}:q)})));
    }
    setPhase('board');setActiveQ(null);setHasBuzzed(false);setBuzzedBy(null);
    setQIdx(i=>i+1);
  }

  // Spacebar to buzz
  useEffect(()=>{
    function onKey(e){if(e.code==='Space'&&phase==='buzzer'&&!hasBuzzed){e.preventDefault();handleBuzz();}}
    window.addEventListener('keydown',onKey);
    return()=>window.removeEventListener('keydown',onKey);
  },[phase,hasBuzzed]);

  /* Overlay state config */
  const overlayStates={
    'answering-me':{
      statusColor:T.gn,
      statusIcon:'🎯',
      statusText:'Du bist dran! Antworte dem Moderator.',
      buzzerActive:false,
      buzzerLabel:'Warte…',
      buzzerNote:'Der Moderator bewertet deine Antwort',
      showBuzzer:false,
    },
    'answering-other':{
      statusColor:T.tm,
      statusIcon:'⏳',
      statusText:`${activePlayerName} antwortet gerade…`,
      showBuzzer:false,
    },
    'buzzer':{
      statusColor:T.go,
      statusIcon:'🔔',
      statusText:'Jetzt buzzern! Wer zuerst drückt, darf antworten.',
      buzzerActive:true,
      buzzerLabel:'BUZZ',
      buzzerNote:'Leertaste oder Button drücken',
      showBuzzer:true,
    },
    'buzzed-me':{
      statusColor:T.go,
      statusIcon:'🔔',
      statusText:'Du hast gebuzzert! Antworte dem Moderator.',
      buzzerActive:false,
      showBuzzer:true,
    },
    'buzzed-other':{
      statusColor:T.tm,
      statusIcon:'🔔',
      statusText:`${buzzedBy} hat gebuzzert.`,
      buzzerActive:false,
      showBuzzer:true,
    },
  };
  const os=overlayStates[phase]||{};

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden',position:'relative'}}>
      {/* Nav */}
      <nav style={{height:54,background:T.s1,borderBottom:`1px solid ${T.bd}`,display:'flex',alignItems:'center',padding:'0 22px',gap:12,flexShrink:0,zIndex:10}}>
        <div style={{fontWeight:800,fontSize:18,display:'flex',alignItems:'center',gap:7}}>
          <span style={{color:T.go}}>⚡</span>BrainStorm
        </div>
        {/* Progress */}
        <div style={{display:'flex',alignItems:'center',gap:8,marginLeft:8}}>
          <div style={{width:100,height:4,background:T.bd,borderRadius:2,overflow:'hidden'}}>
            <div style={{width:`${(playedQ/totalQ)*100}%`,height:'100%',background:T.go,borderRadius:2,transition:'width 0.4s ease'}}/>
          </div>
          <span style={{fontSize:11,color:T.tm}}>{playedQ}/{totalQ}</span>
        </div>
        <div style={{flex:1}}/>
        {/* My identity */}
        <div style={{display:'flex',alignItems:'center',gap:8,background:T.s2,border:`1px solid ${T.bd}`,borderRadius:8,padding:'6px 14px'}}>
          <div style={{width:26,height:26,borderRadius:'50%',background:`${T.pr}20`,border:`2px solid ${T.pr}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:T.pr}}>
            {myName[0]}
          </div>
          <span style={{fontWeight:600,fontSize:14}}>{myName}</span>
        </div>
        {/* Score */}
        <div style={{background:T.s2,border:`1px solid ${T.bd}`,borderRadius:8,padding:'6px 16px',display:'flex',alignItems:'center',gap:7,position:'relative',minWidth:90,justifyContent:'center'}}>
          <span style={{color:T.tm,fontSize:11}}>Score</span>
          <span style={{fontWeight:800,fontSize:17,color:me.score<0?T.rd:T.go}}>{me.score}</span>
          {scoreDelta&&scoreDelta.pid===me.id&&(
            <span key={scoreDelta.key} style={{position:'absolute',top:-18,right:4,fontWeight:800,fontSize:14,color:scoreDelta.val>0?T.gn:T.rd,animation:'floatUp 2s ease-out forwards',whiteSpace:'nowrap',pointerEvents:'none'}}>
              {scoreDelta.val>0?'+':''}{scoreDelta.val}
            </span>
          )}
        </div>
        <span style={{fontSize:11,color:T.tm,letterSpacing:2,background:T.s2,border:`1px solid ${T.bd}`,borderRadius:6,padding:'5px 10px',fontWeight:700}}>A3X9KL</span>
      </nav>

      {/* Board area */}
      <div style={{flex:1,display:'flex',flexDirection:'column',minHeight:0}}>
        <div style={{flex:1,padding:18,display:'flex',flexDirection:'column',gap:8,minHeight:0}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0,marginBottom:2}}>
            <span style={{fontSize:10,fontWeight:700,letterSpacing:2,color:T.tm}}>BOARD</span>
            {phase!=='board'&&(
              <div style={{display:'flex',alignItems:'center',gap:6,fontSize:13}}>
                <span style={{color:os.statusColor}}>{os.statusIcon}</span>
                <span style={{color:os.statusColor,fontWeight:600}}>{os.statusText}</span>
              </div>
            )}
          </div>
          <div style={{display:'grid',gridTemplateColumns:`repeat(${board.length},1fr)`,gridTemplateRows:`auto repeat(${board[0].questions.length},1fr)`,gap:5,flex:1,minHeight:0}}>
            {board.map(c=>(
              <div key={c.id+'h'} style={{background:'#16213a',border:`1px solid #243050`,borderRadius:7,padding:'8px 4px',textAlign:'center',fontWeight:700,fontSize:11,letterSpacing:1.5,color:'#9ab0d8',display:'flex',alignItems:'center',justifyContent:'center'}}>
                {c.name}
              </div>
            ))}
            {Array.from({length:board[0].questions.length}).map((_,ri)=>
              board.map(c=>{
                const q=c.questions[ri];
                return(
                  <div key={q.id} style={{background:q.played?T.bg:T.s1,border:`2px solid ${q.played?T.bd:'#1c2440'}`,borderRadius:7,color:q.played?'transparent':T.go,fontSize:22,fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center',opacity:q.played?0.25:1,transition:'opacity 0.3s'}}>
                    {q.played?'':q.points}
                  </div>
                );
              })
            )}
          </div>
        </div>

        {/* Player strip */}
        <div style={{display:'flex',gap:8,padding:'10px 18px',background:T.bg,borderTop:`1px solid ${T.bd}`,flexShrink:0}}>
          {players.map((p,i)=>{
            const isActive=p.name===activePlayerName&&phase!=='board';
            const isMe=p.name===myName;
            return(
              <div key={p.id} style={{flex:1,border:`2px solid ${isMe?T.pr:isActive?T.gn:T.bd}`,borderRadius:10,background:T.s1,padding:'9px 10px',textAlign:'center',transition:'all 0.2s',boxShadow:isActive?`0 0 14px ${T.gn}35`:isMe?`0 0 10px ${T.pr}25`:'none'}}>
                <div style={{fontSize:9,color:T.tm,marginBottom:4,fontWeight:600}}>#{i+1}</div>
                <div style={{width:30,height:30,borderRadius:'50%',background:isMe?`${T.pr}20`:isActive?`${T.gn}20`:T.s2,border:`2px solid ${isMe?T.pr:isActive?T.gn:T.bd}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700,color:isMe?T.pr:isActive?T.gn:T.tm,margin:'0 auto 4px'}}>
                  {p.name[0]}
                </div>
                {isActive&&<div style={{fontSize:9,color:T.gn,fontWeight:700,letterSpacing:1,marginBottom:2}}>● DRAN</div>}
                <div style={{fontSize:12,fontWeight:isMe?700:500,color:isMe?T.tx:T.tm,marginBottom:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.name}</div>
                <div style={{position:'relative',display:'inline-block'}}>
                  <div style={{fontSize:16,fontWeight:800,color:p.score<0?T.rd:T.go}}>{p.score}</div>
                  {scoreDelta&&scoreDelta.pid===p.id&&(
                    <span key={scoreDelta.key} style={{position:'absolute',right:-8,top:-14,fontWeight:800,fontSize:12,color:scoreDelta.val>0?T.gn:T.rd,animation:'floatUp 2s ease-out forwards',whiteSpace:'nowrap',pointerEvents:'none'}}>
                      {scoreDelta.val>0?'+':''}{scoreDelta.val}
                    </span>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* ══ QUESTION OVERLAY ══ */}
      {showOverlay&&(
        <div style={{position:'absolute',inset:0,background:'rgba(5,7,14,0.96)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',zIndex:50,animation:'fadeInFast 0.2s ease',padding:'32px 40px 20px'}}>

          {/* Question */}
          <div style={{maxWidth:740,width:'100%',textAlign:'center',flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:14}}>
            {/* Meta */}
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <span style={{fontSize:11,color:T.tm,letterSpacing:2,fontWeight:700}}>{activeQ?.category}</span>
              <div style={{background:`${T.go}18`,border:`1px solid ${T.go}50`,borderRadius:20,padding:'4px 14px',display:'flex',alignItems:'center',gap:6}}>
                <span style={{color:T.go,fontWeight:800,fontSize:14}}>{activeQ?.points}</span>
                <span style={{color:`${T.go}80`,fontSize:11}}>Punkte</span>
              </div>
            </div>

            {/* Question text */}
            <h2 style={{fontSize:38,fontWeight:800,lineHeight:1.25,color:T.tx,maxWidth:620,textWrap:'pretty',animation:'slideUp 0.3s ease'}}>
              {activeQ?.text}
            </h2>

            {/* Status banner */}
            <div style={{background:`${os.statusColor}12`,border:`1px solid ${os.statusColor}30`,borderRadius:10,padding:'10px 24px',display:'inline-flex',alignItems:'center',gap:8,marginTop:4}}>
              <span style={{fontSize:18}}>{os.statusIcon}</span>
              <span style={{color:os.statusColor,fontWeight:600,fontSize:15}}>{os.statusText}</span>
            </div>

            {/* Buzzer */}
            {(os.showBuzzer!==false)&&(
              <div style={{marginTop:12,display:'flex',flexDirection:'column',alignItems:'center',gap:10}}>
                <div style={{position:'relative'}}>
                  {phase==='buzzer'&&!hasBuzzed&&(
                    <div style={{position:'absolute',inset:-6,borderRadius:'50%',border:`3px solid ${T.rd}`,animation:'ping 1.2s ease-out infinite',pointerEvents:'none'}}/>
                  )}
                  <button onPointerDown={handleBuzz}
                    disabled={phase!=='buzzer'||hasBuzzed}
                    style={{
                      width:190,height:190,borderRadius:'50%',
                      background:phase==='buzzed-me'?'#2d1515':phase==='buzzer'?T.rd:phase==='buzzed-other'?'#1a1a2a':'#181820',
                      border:`6px solid ${phase==='buzzed-me'?`${T.rd}60`:phase==='buzzer'?`${T.rd}90`:phase==='buzzed-other'?T.bd:'#252540'}`,
                      display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:6,
                      color:'#fff',fontFamily:'inherit',
                      cursor:phase==='buzzer'&&!hasBuzzed?'pointer':'default',
                      boxShadow:phase==='buzzer'&&!hasBuzzed?`0 0 70px ${T.rd}55,0 10px 40px rgba(0,0,0,0.7)`:phase==='buzzed-me'?`0 0 30px ${T.rd}25`:'0 4px 20px rgba(0,0,0,0.5)',
                      animation:phase==='buzzer'&&!hasBuzzed?'pulseRed 1.4s infinite':phase==='buzzed-me'?'buzzShake 0.4s ease':'none',
                      transition:'background 0.25s,box-shadow 0.25s,border-color 0.25s',
                    }}
                  >
                    {phase==='buzzed-me'?(
                      <><span style={{fontSize:34}}>🔔</span><span style={{fontSize:16,fontWeight:700}}>Gebuzzert!</span></>
                    ):phase==='buzzed-other'?(
                      <><span style={{fontSize:28,opacity:0.3}}>🔔</span><span style={{fontSize:13,color:T.tm,fontWeight:500}}>Vergeben</span></>
                    ):(
                      <span style={{fontSize:32,fontWeight:800,letterSpacing:2}}>BUZZ</span>
                    )}
                  </button>
                </div>
                {phase==='buzzer'&&!hasBuzzed&&(
                  <div style={{fontSize:12,color:T.tm,display:'flex',alignItems:'center',gap:6}}>
                    <kbd style={{background:T.s2,border:`1px solid ${T.bd}`,borderRadius:4,padding:'2px 8px',fontSize:11,color:T.tm}}>Leertaste</kbd>
                    <span>oder Button drücken</span>
                  </div>
                )}
              </div>
            )}
          </div>

          {/* Mini leaderboard strip */}
          <div style={{display:'flex',gap:10,background:T.s1,borderRadius:10,padding:'10px 20px',border:`1px solid ${T.bd}`,flexShrink:0}}>
            {leaderboard.map((p,i)=>(
              <div key={p.id} style={{display:'flex',alignItems:'center',gap:6,padding:'4px 10px',borderRadius:6,background:p.name===myName?`${T.pr}15`:T.s2,border:`1px solid ${p.name===myName?T.pr:T.bd}`}}>
                <span style={{color:T.tm,fontSize:11,minWidth:18}}>#{i+1}</span>
                <span style={{fontSize:13,fontWeight:p.name===myName?700:400,color:p.name===myName?T.tx:T.tm}}>{p.name}</span>
                <span style={{fontWeight:700,fontSize:13,color:p.score<0?T.rd:T.go,minWidth:30,textAlign:'right'}}>{p.score}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ══ DEMO CONTROLS ══ */}
      <div style={{position:'fixed',bottom:18,left:'50%',transform:'translateX(-50%)',background:T.s2,border:`1px solid ${T.bd}`,borderRadius:12,padding:'9px 16px',display:'flex',gap:7,alignItems:'center',zIndex:100,boxShadow:'0 8px 32px rgba(0,0,0,0.6)'}}>
        <span style={{fontSize:10,color:T.tm,fontWeight:700,letterSpacing:1.5,marginRight:4,userSelect:'none'}}>DEMO</span>
        {phase==='board'&&<button onClick={demoOpen} style={{background:T.pr,color:'#fff',borderRadius:6,padding:'5px 13px',fontSize:12,fontWeight:600,fontFamily:'inherit'}}>Frage öffnen</button>}
        {phase==='answering-me'&&<>
          <button onClick={()=>demoCorrect(false)} style={{background:'#16a34a',color:'#fff',borderRadius:6,padding:'5px 13px',fontSize:12,fontWeight:600,fontFamily:'inherit'}}>✓ Richtig</button>
          <button onClick={demoWrong} style={{background:T.rd,color:'#fff',borderRadius:6,padding:'5px 13px',fontSize:12,fontWeight:600,fontFamily:'inherit'}}>✗ Falsch</button>
        </>}
        {phase==='answering-other'&&<button onClick={demoBuzzer} style={{background:T.go,color:'#000',borderRadius:6,padding:'5px 13px',fontSize:12,fontWeight:600,fontFamily:'inherit'}}>Buzzer öffnen</button>}
        {phase==='buzzer'&&<button onClick={demoOtherBuzz} style={{background:T.s1,color:T.tm,border:`1px solid ${T.bd}`,borderRadius:6,padding:'5px 13px',fontSize:12,fontFamily:'inherit'}}>Anderer buzzert</button>}
        {phase==='buzzed-me'&&<>
          <button onClick={()=>demoCorrect(true)} style={{background:'#16a34a',color:'#fff',borderRadius:6,padding:'5px 13px',fontSize:12,fontWeight:600,fontFamily:'inherit'}}>✓ Richtig (½)</button>
          <button onClick={()=>closeQ(true)} style={{background:T.rd,color:'#fff',borderRadius:6,padding:'5px 13px',fontSize:12,fontWeight:600,fontFamily:'inherit'}}>✗ Falsch</button>
        </>}
        {phase==='buzzed-other'&&<button onClick={()=>closeQ(true)} style={{background:T.s1,color:T.tm,border:`1px solid ${T.bd}`,borderRadius:6,padding:'5px 13px',fontSize:12,fontFamily:'inherit'}}>Schließen</button>}
        <div style={{width:1,height:20,background:T.bd,margin:'0 4px'}}/>
        <button onClick={onEnd} style={{background:'transparent',color:T.tm,border:`1px solid ${T.bd}`,borderRadius:6,padding:'5px 11px',fontSize:12,fontFamily:'inherit'}}>→ Ende</button>
      </div>
    </div>
  );
}

/* ── END PAGE ── */
function EndPage({myName,onRestart}){
  const results=[
    {name:myName,score:500},{name:'David',score:300},
    {name:'Ben',score:100},{name:'Clara',score:-100},
  ].sort((a,b)=>b.score-a.score);
  const myRank=results.findIndex(p=>p.name===myName)+1;

  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:T.bg,padding:40}}>
      <div style={{textAlign:'center',marginBottom:32,animation:'fadeIn 0.4s ease'}}>
        <div style={{fontSize:70,marginBottom:8}}>🏆</div>
        <h1 style={{fontSize:44,fontWeight:800,marginBottom:8}}>Spiel vorbei!</h1>
        {myRank===1?(
          <div style={{color:T.go,fontWeight:700,fontSize:16}}>Glückwunsch — du hast gewonnen!</div>
        ):(
          <div style={{color:T.tm,fontSize:15}}>Du hast Platz <strong style={{color:T.tx}}>#{myRank}</strong> erreicht</div>
        )}
      </div>

      <div style={{display:'flex',flexDirection:'column',gap:10,width:'100%',maxWidth:520,marginBottom:36}}>
        {results.map((p,i)=>(
          <div key={p.name} style={{display:'flex',alignItems:'center',gap:16,background:i===0?'#1c1600':p.name===myName?`${T.pr}10`:T.s1,border:`2px solid ${i===0?T.go:p.name===myName?T.pr:T.bd}`,borderRadius:12,padding:'15px 20px',animation:`rankIn 0.4s ${i*0.1}s ease both`}}>
            <span style={{fontSize:26,minWidth:42}}>{i===0?'🥇':i===1?'🥈':i===2?'🥉':`#${i+1}`}</span>
            <div style={{width:36,height:36,borderRadius:'50%',background:p.name===myName?`${T.pr}20`:T.s2,border:`2px solid ${p.name===myName?T.pr:T.bd}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,fontWeight:700,color:p.name===myName?T.pr:T.tm,flexShrink:0}}>
              {p.name[0]}
            </div>
            <span style={{flex:1,fontSize:17,fontWeight:600}}>{p.name}</span>
            {p.name===myName&&<span style={{fontSize:11,background:`${T.pr}20`,color:T.pr,padding:'2px 8px',borderRadius:10,fontWeight:700}}>du</span>}
            <span style={{fontWeight:800,color:p.score<0?T.rd:T.go,fontSize:20}}>{p.score}<span style={{fontSize:12,color:T.tm,fontWeight:400,marginLeft:3}}>Pts</span></span>
          </div>
        ))}
      </div>

      <button onClick={onRestart}
        style={{background:T.pr,color:'#fff',borderRadius:10,padding:'14px 44px',fontSize:16,fontWeight:700,boxShadow:`0 4px 20px ${T.pr}40`,fontFamily:'inherit',animation:'fadeIn 0.6s 0.4s ease both'}}
        onMouseEnter={e=>e.currentTarget.style.filter='brightness(1.12)'}
        onMouseLeave={e=>e.currentTarget.style.filter='brightness(1)'}
      >Neues Spiel</button>
    </div>
  );
}

/* ── APP ── */
function App(){
  const [page,setPage]=useState('join');
  const [myName,setMyName]=useState('');
  return(
    <>
      {page==='join'&&<JoinPage onJoin={n=>{setMyName(n);setPage('waiting');}}/>}
      {page==='waiting'&&<WaitingPage myName={myName} onStart={()=>setPage('game')}/>}
      {page==='game'&&<GamePage myName={myName} onEnd={()=>setPage('end')}/>}
      {page==='end'&&<EndPage myName={myName} onRestart={()=>setPage('join')}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
